name: CI/CD Pipeline

# 1. ADDED: An 'on' trigger is required for a workflow to run. 
# You can change 'main' to whichever branch you want to track.
on:
  push:
    branches:
      - main

# 2. FIXED: Typo "ermissions" to "permissions"
permissions:
  contents: read
  packages: write

jobs:
  build-test-deliver:
    runs-on: ubuntu-latest
    steps:
      # 3. FIXED: Indentation. 'uses', 'run', and 'with' must align 
      # under the list item ('- name') they belong to.
      - name: Checkout source code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Run tests
        run: npm start
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kanass20/task-manager-api:latest
            ghcr.io/kanass20/task-manager-api:prod